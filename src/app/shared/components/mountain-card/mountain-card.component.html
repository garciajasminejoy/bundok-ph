<p-card (click)="viewDetails()">
  <ng-template #header>
    <div class="relative">
      <img
        alt="Card"
        class="card-header-image"
        src="assets/images/sample.jpg"
      />
    </div>
  </ng-template>
  <ng-template #title>{{ mountain()?.name }}</ng-template>
  <div class="grid grid-cols-2 gap-2 py-2">
    <div class="col-span-1 flex items-center">
      <i class="pi pi-map-marker text-highlight"></i>
      <span class="font-semibold ml-2">{{ mountain()?.location }}</span>
    </div>
    <div class="col-span-1">
      <i class="pi pi-arrow-up-right text-highlight"></i>
      <span class="font-semibold ml-2"
        >{{ mountain()?.elevationGain }} MASL</span
      >
    </div>
    <div class="col-span-1">
      <i class="pi pi-compass text-highlight"></i>
      <span class="font-semibold ml-2">{{ mountain()?.distance }}</span>
    </div>
    <div class="col-span-1">
      <i class="pi pi-trophy text-highlight"></i>
      <span class="font-semibold ml-2">{{ mountain()?.difficulty }}</span>
    </div>
  </div>

  <ng-template #footer>
    <div class="flex justify-between items-center mt-1">
      <div class="w-full">
        <p-button label="View Details" class="card-btn" [fluid]="true" />
      </div>
    </div>
  </ng-template>
</p-card>
