<div class="mountain-details">
  <div class="banner">
    <div class="flex justify-center h-full items-center flex-col">
      <h1 class="text-primary text-4xl font-bold flex items-center">
        <span>{{ mountain?.name }}</span>
      </h1>
      <h5 class="text-primary text-xl font-semibold">{{ mountain?.elevationGain }} MASL</h5>
    </div>
  </div>
  <div class="page-content">
    <p class="my-2">{{ mountain?.description }}</p>
  </div>
</div>
