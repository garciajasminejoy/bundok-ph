<div class="organizers">
  <div class="page-content">
    <div class="flex justify-between items-center">
      <div class="filter-start">
        <p-select
          [options]="locations"
          [(ngModel)]="selectedLocation"
          optionLabel="name"
          placeholder="Select a Location"
          class="w-full md:w-56 mr-4"
        />
      </div>

      <div class="filter-end">
        <p-inputgroup>
          <input pInputText placeholder="Keyword" />
          <p-inputgroup-addon>
            <p-button icon="pi pi-search" severity="secondary" variant="text" />
          </p-inputgroup-addon>
        </p-inputgroup>
      </div>
    </div>

    <div
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-[3rem]"
    >
      @for (organizer of organizers; track organizer.id) {
        <div class="card">
          <app-organizer-card
            [organizer]="organizer"
            class="mb-4"
          ></app-organizer-card>
        </div>
      }
    </div>
  </div>
</div>
